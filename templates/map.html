<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BLE Distance Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg:     #0b0f1a;
    --panel:  #111827;
    --border: #1e2d45;
    --accent: #38bdf8;
    --green:  #22d3a5;
    --yellow: #fbbf24;
    --red:    #f43f5e;
    --text:   #e2e8f0;
    --muted:  #64748b;
    --font:   'Courier New', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  #header h1 { font-size: 13px; color: var(--accent); letter-spacing: 0.15em; }
  #port-badge {
    margin-left: auto;
    background: var(--border);
    padding: 2px 10px;
    border-radius: 3px;
    color: var(--muted);
    font-size: 10px;
  }
  #stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    background: var(--panel);
    padding: 7px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .stat-value {
    font-size: 20px;
    font-weight: bold;
    color: var(--accent);
    line-height: 1;
    transition: color 0.3s;
  }
  .stat-unit { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; }
  #map { flex: 1; }
  #bottom {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 5px 14px;
    background: var(--panel);
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
  }
  #gps-status { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #signal-badge {
    padding: 2px 10px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 0.06em;
    background: var(--red);
    color: #fff;
    transition: background 0.4s;
    white-space: nowrap;
  }
  #spark-wrap { width: 120px; height: 28px; flex-shrink: 0; }
  #sparkline  { width: 100%; height: 100%; }
  #conf-ring {
    position: absolute;
    bottom: 48px;
    right: 14px;
    width: 64px;
    height: 64px;
    z-index: 1000;
    pointer-events: none;
  }
  .leaflet-popup-content-wrapper {
    background: var(--panel) !important;
    color: var(--text) !important;
    border: 1px solid var(--border) !important;
    font-family: var(--font) !important;
    font-size: 12px !important;
  }
  .leaflet-popup-tip { background: var(--panel) !important; }
  .leaflet-control-layers {
    background: var(--panel) !important;
    border: 1px solid var(--border) !important;
    color: var(--text) !important;
    font-family: var(--font) !important;
    font-size: 11px !important;
  }
  .leaflet-control-layers label { color: var(--text) !important; }
</style>
</head>
<body>

<div id="header">
  <h1>▸ BLE DISTANCE MAP</h1>
  <span style="color:var(--muted)">v3.0</span>
  <span id="port-badge">PORT: –</span>
</div>

<div id="stats">
  <div class="stat">
    <div class="stat-label">Distance</div>
    <div class="stat-value" id="s-dist">–</div>
    <div class="stat-unit">metres</div>
  </div>
  <div class="stat">
    <div class="stat-label">RSSI (Kalman)</div>
    <div class="stat-value" id="s-rssi">–</div>
    <div class="stat-unit">dBm</div>
  </div>
  <div class="stat">
    <div class="stat-label">Confidence</div>
    <div class="stat-value" id="s-conf">–</div>
    <div class="stat-unit">%</div>
  </div>
  <div class="stat">
    <div class="stat-label">GPS Accuracy</div>
    <div class="stat-value" id="s-gpsacc" style="font-size:18px">–</div>
    <div class="stat-unit">± metres</div>
  </div>
  <div class="stat">
    <div class="stat-label">Last Update</div>
    <div class="stat-value" id="s-age" style="font-size:18px">–</div>
    <div class="stat-unit">seconds ago</div>
  </div>
</div>

<div id="map"></div>

<svg id="conf-ring" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="28" fill="none" stroke="#1e2d45" stroke-width="5"/>
  <circle id="conf-arc" cx="32" cy="32" r="28" fill="none"
          stroke="#38bdf8" stroke-width="5"
          stroke-dasharray="175.9" stroke-dashoffset="175.9"
          stroke-linecap="round"
          transform="rotate(-90 32 32)"
          style="transition:stroke-dashoffset 0.5s,stroke 0.5s"/>
  <text x="32" y="36" text-anchor="middle" font-size="11"
        font-family="'Courier New',monospace" fill="#e2e8f0" id="conf-text">–</text>
</svg>

<div id="bottom">
  <span id="gps-status">Waiting for GPS…</span>
  <div id="spark-wrap"><canvas id="sparkline"></canvas></div>
  <span id="signal-badge">No BLE signal</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  MAP SETUP
// ═══════════════════════════════════════════════════════════════════
const map = L.map("map", { zoomControl: true, attributionControl: true });

const streets = L.tileLayer(
  "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors', maxZoom: 19 }
);
const satellite = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: '© Esri, Maxar, Earthstar Geographics', maxZoom: 19 }
);
const satLabels = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
  { maxZoom: 19 }
);

streets.addTo(map);
L.control.layers(
  { "Streets (OSM)": streets,
    "Satellite": satellite,
    "Satellite + Labels": L.layerGroup([satellite, satLabels]) },
  {}, { position: "topright" }
).addTo(map);

// ═══════════════════════════════════════════════════════════════════
//  GPS AVERAGING — weighted by accuracy, discard outliers
// ═══════════════════════════════════════════════════════════════════
const GPS_HISTORY    = 8;    // number of recent fixes to average
const GPS_MAX_ACC    = 150;  // relaxed for WiFi-based laptop GPS
const GPS_DRIFT_M    = 3.0;  // ignore jumps < this as noise

let gpsReadings   = [];      // { lat, lng, acc, ts }
let anchorLL      = null;    // smoothed position sent to map
let markerDot     = null;
let haloCircle    = null;
let circleRing    = null;
let circleArea    = null;
let centred       = false;
let lastRawLL     = null;

// Weighted average of recent GPS fixes (weight = 1/accuracy²)
function computeSmoothedGPS() {
  if (gpsReadings.length === 0) return null;
  let wLat = 0, wLng = 0, wSum = 0;
  for (const r of gpsReadings) {
    const w = 1.0 / (r.acc * r.acc);
    wLat += r.lat * w;
    wLng += r.lng * w;
    wSum += w;
  }
  return [wLat / wSum, wLng / wSum];
}

// Haversine distance in metres between two [lat,lng] pairs
function haversine(a, b) {
  const R  = 6371000;
  const φ1 = a[0] * Math.PI / 180;
  const φ2 = b[0] * Math.PI / 180;
  const dφ = (b[0] - a[0]) * Math.PI / 180;
  const dλ = (b[1] - a[1]) * Math.PI / 180;
  const s  = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1-s));
}

function onGPSFix(pos) {
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;

  // Discard very poor fixes
  if (acc > GPS_MAX_ACC) {
    document.getElementById("gps-status").textContent =
      `GPS fix too poor (±${Math.round(acc)} m) — waiting…`;
    return;
  }

  // Discard tiny jitter if we already have a position
  if (lastRawLL) {
    const jump = haversine(lastRawLL, [lat, lng]);
    // Keep it if it moved meaningfully OR if acc improved a lot
    if (jump < 0.5 && acc >= (lastRawLL[2] || 999)) {
      // Very tiny movement and not better accuracy — still update buffer
    }
  }
  lastRawLL = [lat, lng, acc];

  // Add to rolling buffer
  gpsReadings.push({ lat, lng, acc, ts: Date.now() });
  // Keep only the most recent N fixes
  if (gpsReadings.length > GPS_HISTORY) gpsReadings.shift();

  // Compute smoothed position
  const smoothed = computeSmoothedGPS();
  if (!smoothed) return;

  // Only update anchor if moved more than drift threshold
  if (anchorLL && haversine(anchorLL, smoothed) < GPS_DRIFT_M * 0.3) {
    // Tiny drift — blend gently instead of snapping
    anchorLL = [
      anchorLL[0] * 0.7 + smoothed[0] * 0.3,
      anchorLL[1] * 0.7 + smoothed[1] * 0.3
    ];
  } else {
    anchorLL = smoothed;
  }

  // GPS accuracy stat
  document.getElementById("s-gpsacc").textContent = Math.round(acc);
  const accEl = document.getElementById("s-gpsacc");
  accEl.style.color = acc <= 10 ? "var(--green)" : acc <= 25 ? "var(--accent)" : "var(--yellow)";

  document.getElementById("gps-status").textContent =
    `GPS ${anchorLL[0].toFixed(6)}, ${anchorLL[1].toFixed(6)}  ±${Math.round(acc)} m  (avg ${gpsReadings.length} fixes)`;

  // Map marker
  if (!markerDot) {
    haloCircle = L.circle(anchorLL, {
      radius: acc, color: "#38bdf8", fillColor: "#38bdf8",
      fillOpacity: 0.06, weight: 1
    }).addTo(map);

    markerDot = L.circleMarker(anchorLL, {
      radius: 8, color: "#0ea5e9", fillColor: "#38bdf8",
      fillOpacity: 1, weight: 2
    }).addTo(map).bindPopup(`<b>Anchor (ESP32)</b><br>±${Math.round(acc)} m GPS accuracy`);

    if (!centred) { map.setView(anchorLL, 19); centred = true; }
  } else {
    markerDot.setLatLng(anchorLL);
    haloCircle.setLatLng(anchorLL).setRadius(acc);
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    document.getElementById("gps-status").textContent = "Geolocation not supported";
    return;
  }
  navigator.geolocation.watchPosition(onGPSFix, err => {
    document.getElementById("gps-status").textContent = "GPS error: " + err.message;
  }, {
    enableHighAccuracy: true,   // forces real GPS chip, not wifi/cell
    maximumAge: 0,              // never use cached position
    timeout: 15000
  });
}

// ═══════════════════════════════════════════════════════════════════
//  COLOUR HELPERS
// ═══════════════════════════════════════════════════════════════════
function distColor(conf) {
  if (conf >= 75) return "#38bdf8";
  if (conf >= 50) return "#22d3a5";
  if (conf >= 30) return "#fbbf24";
  return "#f43f5e";
}

// ═══════════════════════════════════════════════════════════════════
//  STATS PANEL
// ═══════════════════════════════════════════════════════════════════
function setStatColor(id, val, lo, hi) {
  const el = document.getElementById(id);
  if (val == null) { el.style.color = "var(--muted)"; return; }
  el.style.color = val >= hi ? "var(--green)" : val >= lo ? "var(--accent)" : "var(--red)";
}

function updateStats(d) {
  const dist  = d.distance_m;
  const conf  = d.confidence;
  const rssi  = d.rssi_kalman;
  const age   = d.age_s;
  const stale = d.stale;

  document.getElementById("s-dist").textContent = dist != null ? dist.toFixed(2) : "–";
  document.getElementById("s-rssi").textContent = rssi != null ? rssi.toFixed(1) : "–";
  document.getElementById("s-conf").textContent = conf != null ? conf : "–";
  document.getElementById("s-age").textContent  = age  != null ? age.toFixed(1) : "–";

  setStatColor("s-dist", dist != null ? -dist : null, -5, -1);
  setStatColor("s-conf", conf, 40, 70);
  setStatColor("s-age",  stale ? null : -age, -3, -1);

  // Signal badge
  const badge = document.getElementById("signal-badge");
  if (!d.tag_present || stale) {
    badge.textContent = "No BLE signal";
    badge.style.background = "var(--red)";
  } else if (conf >= 70) {
    badge.textContent = "▲ Strong";
    badge.style.background = "#0ea5e9";
  } else if (conf >= 45) {
    badge.textContent = "◆ Medium";
    badge.style.background = "#d97706";
  } else {
    badge.textContent = "▼ Weak";
    badge.style.background = "#be123c";
  }

  // Confidence ring
  const circ = 2 * Math.PI * 28;
  const arc  = document.getElementById("conf-arc");
  const pct  = conf != null ? conf / 100 : 0;
  arc.setAttribute("stroke-dashoffset", (circ * (1 - pct)).toFixed(1));
  arc.setAttribute("stroke", distColor(conf || 0));
  document.getElementById("conf-text").textContent = conf != null ? conf + "%" : "–";

  if (d.port) document.getElementById("port-badge").textContent = "PORT: " + d.port;
}

// ═══════════════════════════════════════════════════════════════════
//  MAP CIRCLE
// ═══════════════════════════════════════════════════════════════════
function updateCircle(ll, dist, conf) {
  const color = distColor(conf || 0);
  if (!circleRing) {
    circleArea = L.circle(ll, {
      radius: dist, color: color, fillColor: color,
      fillOpacity: 0.06, weight: 0
    }).addTo(map);
    circleRing = L.circle(ll, {
      radius: dist, color: color, fillColor: "transparent",
      fillOpacity: 0, weight: 2, dashArray: "6 4"
    }).addTo(map);
  } else {
    circleArea.setLatLng(ll).setRadius(dist).setStyle({ color, fillColor: color });
    circleRing.setLatLng(ll).setRadius(dist).setStyle({ color });
  }
}

// ═══════════════════════════════════════════════════════════════════
//  SPARKLINE
// ═══════════════════════════════════════════════════════════════════
const cvs = document.getElementById("sparkline");
const ctx = cvs.getContext("2d");
function drawSparkline(history) {
  cvs.width  = cvs.offsetWidth;
  cvs.height = cvs.offsetHeight;
  if (!history || history.length < 2) return;
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  const mn = Math.min(...history);
  const mx = Math.max(...history) || mn + 0.1;
  const w  = cvs.width, h = cvs.height;
  ctx.beginPath();
  ctx.strokeStyle = "#38bdf8";
  ctx.lineWidth   = 1.5;
  history.forEach((v, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - ((v - mn) / (mx - mn)) * (h - 4) - 2;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();
}

// ═══════════════════════════════════════════════════════════════════
//  BLE DATA POLL
// ═══════════════════════════════════════════════════════════════════
async function poll() {
  try {
    const r = await fetch("/data");
    const d = await r.json();
    updateStats(d);
    drawSparkline(d.history);
    if (anchorLL && d.distance_m != null && !d.stale && d.tag_present) {
      updateCircle(anchorLL, d.distance_m, d.confidence);
    }
  } catch(e) {
    document.getElementById("gps-status").textContent = "Flask not reachable — is app.py running?";
  }
}

// ═══════════════════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════════════════
startGPS();
poll();
setInterval(poll, 700);
</script>
</body>
</html>
