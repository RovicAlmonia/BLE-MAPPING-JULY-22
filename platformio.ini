; ──────────────────────────────────────────
; BLE Distance — Single ESP32
; ──────────────────────────────────────────
[env:esp32]
platform   = espressif32
board      = esp32dev
framework  = arduino

monitor_speed = 115200
upload_speed  = 921600

; ── Tune these ─────────────────────────────
; TX_POWER   : measure RSSI at exactly 1 m, put the average here
; PATH_LOSS_N: 2.0=open  2.7=classroom  3.2=obstructed
build_flags =
    -DTARGET_ADDR=\"f7:6c:a5:11:0a:f7\"
    -DTX_POWER=-65
    -DPATH_LOSS_N=2.8f
    -DLOG_LEVEL=3